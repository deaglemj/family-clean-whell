<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Husets Årshjul</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header no-print">
    <div>
      <h1>Husets Årshjul</h1>
      <p>Statisk ugeplan, årshjul og opgavedatabase baseret på én masterliste.</p>
    </div>
    <div class="actions">
      <label class="file-label">Indlæs tasks.json
        <input id="fileInput" type="file" accept="application/json,.json">
      </label>
      <button id="loadExampleBtn" type="button">Indlæs eksempeldata</button>
      <button id="printBtn" type="button">Print valgt uge</button>
    </div>
  </header>

  <nav class="tabs no-print" aria-label="Visninger">
    <button data-view="dashboard" class="active">Dashboard</button>
    <button data-view="week">Denne uge</button>
    <button data-view="wheel">Årshjul</button>
    <button data-view="planning">Planlægning</button>
    <button data-view="database">Opgavedatabase</button>
    <button data-view="house">Husets oplysninger</button>
    <button data-view="car">Bil</button>
    <button data-view="help">Hjælp</button>
  </nav>

  <main>
    <section class="toolbar no-print">
      <label>Valgt uge
        <select id="weekSelect"></select>
      </label>
      <label>Søg
        <input id="searchInput" type="search" placeholder="Rum, opgave, kategori...">
      </label>
      <label>Kategori
        <select id="categoryFilter"><option value="">Alle</option></select>
      </label>
    </section>

    <section id="status" class="status no-print"></section>

    <section id="dashboard" class="view active-view"></section>
    <section id="week" class="view print-area"></section>
    <section id="wheel" class="view"></section>
    <section id="planning" class="view"></section>
    <section id="database" class="view"></section>
    <section id="house" class="view"></section>
    <section id="car" class="view"></section>
    <section id="help" class="view"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
